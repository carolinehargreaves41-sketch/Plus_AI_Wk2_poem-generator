<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/style.css" />
    <title>AI Poem Generator</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>AI Poem Generator</h1>
      </header>

      <main>
        <div class="form-wrapper">
          <form id="poem-generator-form">
            <input
              type="text"
              placeholder="Topic of poem"
              autofocus="on"
              autocomplete="off"
              required
              class="instructions"
              id="user-instructions"
            />
            <input type="submit" class="submit-button" value="Create" />
          </form>
          <div class="hint">
            What do you want your poem to be about? Clouds🌩️ or cheese🧀 - the
            choice is yours!
          </div>
        </div>
        <div class="poem hidden blink" id="poem"></div>
      </main>

      <footer>
        This AI project was coded by
        <a href="" target="_blank">Caroline Hargreaves</a> and is
        <a href="" target="_blank">open-sourced on GitHub</a> and is
        <a href="" target="_blank">hosted on Netlify</a>
      </footer>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
